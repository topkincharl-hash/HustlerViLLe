name: QueenZoe Build Executor

on:
  workflow_dispatch:
    inputs:
      buildIntent:
        description: "Base64 encoded QueenZoe build intent"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode Build Intent
        run: |
          echo "${{ inputs.buildIntent }}" | base64 -d > build-intent.json
          cat build-intent.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build with QueenZoe Intent
        run: |
          ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: queenzoe-build
          path: app/build/outputs/