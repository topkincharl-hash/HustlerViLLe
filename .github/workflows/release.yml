name: QueenZoe CI Executor

on:
  workflow_dispatch:
    inputs:
      buildIntent:
        required: true
        description: "Base64 encoded QueenZoe build intent"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode Intent
        run: |
          echo "${{ inputs.buildIntent }}" | base64 -d > intent.json
          cat intent.json

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Release
        run: ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: queenzoe-artifact
          path: app/build/outputs/